name: CI Develop

on:
  push:
    branches: [ "develop" ]

env:
  PYTHON_VERSION: "3.14"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install --group dev
      - name: Run Ruff
        run: ruff check .
      - name: Run tests
        run: pytest -q

  optional-install-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        surface: [core, dashboard, notebook, brayton_cycle]
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install package surface
        run: |
          python -m pip install --upgrade pip
          case "${{ matrix.surface }}" in
            core) pip install . ;;
            dashboard) pip install ".[dashboard]" ;;
            notebook) pip install ".[notebook]" ;;
            brayton_cycle) pip install ".[brayton_cycle]" ;;
          esac
      - name: Run optional install smoke
        run: python scripts/optional_install_smoke.py ${{ matrix.surface }}
