[build-system]
requires = ["hatchling >= 1.26"]
build-backend = "hatchling.build"

[tool.hatch.build]
exclude = [
  "/examples/**",
  "/tests/fixtures/workbooks/**",
  "**/__pycache__/**",
  "**/.DS_Store",
  "**/*.py[cod]",
]

[tool.hatch.build.targets.sdist]
include = [
  "/LICENSE",
  "/README.md",
  "/pyproject.toml",
  "/OpenPinch",
]
exclude = [
  "/.gitignore",
]

[tool.hatch.build.targets.wheel]
packages = ["OpenPinch"]
[project]
name = "OpenPinch"
dependencies=[
  "numpy",
  "pint",
  "pandas",
  "coolprop",
  "pydantic",
  "openpyxl",
  "pyxlsb",
  "scipy",
  "streamlit",
  "plotly",
  "tespy",
]
version = "0.1.14"
authors = [
  { name="Tim Walmsley", email="tim.walmsley@waikato.ac.nz" },
]
description = "An advanced pinch analysis and total site integration toolkit"
readme = "README.md"
requires-python = ">=3.14"
classifiers = [
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
license = "MIT"
license-files = ["LICEN[CS]E*"]

[project.urls]
Homepage = "https://github.com/waikato-ahuora-smart-energy-systems/OpenPinch"
Issues = "https://github.com/waikato-ahuora-smart-energy-systems/OpenPinch/issues"

[project.scripts]
openpinch = "OpenPinch.__main__:main"

[project.optional-dependencies]
dev = [
  "black>=23.9",
  "ruff>=0.1.8",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.8",
]

[tool.black]
line-length = 88
target-version = ["py314"]

[tool.ruff]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E203"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
